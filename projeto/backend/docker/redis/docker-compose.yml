services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${CACHE_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${CACHE_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${CACHE_PASSWORD} --raw PING | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

