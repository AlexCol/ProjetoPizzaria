services:
  database:
    image: "postgres:16.0-alpine3.18"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${PGTZ:-America/Sao_Paulo}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c timezone=${TZ:-America/Sao_Paulo}
    container_name: "postgres"
    restart: always
    ports:
      - "${POSTGRES_HOST_PORT:-5444}:${POSTGRES_CONTAINER_PORT:-5432}"

